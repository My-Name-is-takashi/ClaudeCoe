<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動画ライブラリ | 情シス養成講座</title>
<style>
  :root{--bg:#f6f7fb;--card:#fff;--text:#1f2430;--sub:#626b7f;--accent:#4f6df5;--soft:#e8ecfe;--line:#e3e6ee;}
  @media (prefers-color-scheme:dark){:root{--bg:#14171f;--card:#1d212c;--text:#e8eaf0;--sub:#99a1b3;--accent:#7b93ff;--soft:#2a3350;--line:#2c3140;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
  header{background:linear-gradient(120deg,var(--accent),#8a5cf6);color:#fff;padding:26px 20px;text-align:center;}
  header h1{font-size:1.4rem;}
  header p{opacity:.9;font-size:.9rem;margin-top:4px;}
  .bar{max-width:860px;margin:0 auto;padding:12px 16px 0;}
  .bar a{color:var(--accent);text-decoration:none;font-weight:700;font-size:.9rem;}
  .wrap{max-width:860px;margin:0 auto;padding:8px 16px 60px;}
  .part{margin-top:26px;}
  .part h2{font-size:1.05rem;border-left:5px solid var(--accent);padding-left:10px;margin-bottom:12px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;text-decoration:none;color:var(--text);
        display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.12);border-color:var(--accent);}
  .thumb{aspect-ratio:16/10;background:linear-gradient(150deg,#4756c4,#8a5cf6);position:relative;display:flex;align-items:center;justify-content:center;}
  .thumb .emoji{font-size:56px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.3));}
  .thumb .play{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.92);
       display:flex;align-items:center;justify-content:center;color:#4756c4;font-size:22px;padding-left:4px;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .thumb .dur{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.6);color:#fff;font-size:.72rem;padding:2px 7px;border-radius:6px;font-variant-numeric:tabular-nums;}
  .cbody{padding:12px 13px;}
  .cbody .vt{font-size:.92rem;font-weight:700;line-height:1.4;}
  footer{text-align:center;color:var(--sub);font-size:.8rem;padding:24px;}
</style>
</head>
<body>
<header>
  <h1>🎬 動画ライブラリ</h1>
  <p>ナビゲーター「いろは」がやさしく解説(全30本・約55分)</p>
</header>
<div class="bar"><a href="index.html">← 学習ポータルへ戻る</a></div>
<div class="wrap" id="lib"></div>
<footer>音声: VOICEVOX 春日部つむぎ / タップで再生ページへ移動します</footer>

<script src="js/videos-data.js"></script>
<script>
const PART_NAMES={
 "0":"Part 0 オリエンテーション","1":"Part 1 コンピュータとOSの基礎","2":"Part 2 ネットワーク基礎",
 "3":"Part 3 Linuxサーバー","4":"Part 4 Windows Server / AD","5":"Part 5 クラウドとSaaS",
 "6":"Part 6 情報セキュリティ","7":"Part 7 IT運用とヘルプデスク","8":"Part 8 情シス実務スキル"};
const EMO=[["vi","📝"],["nginx","🌐"],["Linux","🐧"],["ネットワーク","🌐"],["IP","🔢"],["サブネット","🔢"],
 ["DNS","📖"],["VLAN","🔀"],["Active Directory","🗂️"],["Windows Server","🖥️"],["クラウド","☁️"],
 ["ピザ","🍕"],["M365","📧"],["SSO","🔑"],["パスワード","🔑"],["AWS","☁️"],["攻撃","🛡️"],["EDR","🛡️"],
 ["メール","📧"],["開いてしまった","⚠️"],["いい人","🔄"],["説明","💬"],["キッティング","📦"],
 ["パソコン","💻"],["スペック","💻"],["OS","⚙️"],["仮想化","🖥️"],["1日","📅"],["ミライ商事","🏢"],["情シス","🖥️"]];
function emo(t){for(const[k,e]of EMO)if(t.includes(k))return e;return "💡";}
function fmt(s){const m=Math.floor(s/60),x=s%60;return `${m}:${String(x).padStart(2,"0")}`;}

const data=window.VIDEOS_BY_CHAPTER;
const keys=Object.keys(data).sort((a,b)=>{const pa=a.split("-").map(Number),pb=b.split("-").map(Number);return pa[0]-pb[0]||pa[1]-pb[1];});
const byPart={};
keys.forEach(ch=>{const p=ch.split("-")[0];(byPart[p]=byPart[p]||[]).push(ch);});

let html="";
Object.keys(byPart).sort((a,b)=>a-b).forEach(p=>{
  html+=`<div class="part"><h2>${PART_NAMES[p]||("Part "+p)}</h2><div class="grid">`;
  byPart[p].forEach(ch=>data[ch].forEach(v=>{
    html+=`<a class="card" href="video.html?v=${encodeURIComponent(v.file)}">
      <div class="thumb"><span class="emoji">${emo(v.title)}</span><span class="play">▶</span><span class="dur">${fmt(v.dur)}</span></div>
      <div class="cbody"><div class="vt">${v.title}</div></div></a>`;
  }));
  html+=`</div></div>`;
});
document.getElementById("lib").innerHTML=html;
</script>
</body>
</html>
