<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情シス養成講座 学習ポータル</title>
<style>
  :root {
    --bg: #f6f7fb; --card: #ffffff; --text: #1f2430; --sub: #626b7f;
    --accent: #4f6df5; --accent-soft: #e8ecfe; --line: #e3e6ee;
    --ok: #2fa572; --ok-soft: #e2f5ec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171f; --card: #1d212c; --text: #e8eaf0; --sub: #99a1b3;
      --accent: #7b93ff; --accent-soft: #2a3350; --line: #2c3140;
      --ok: #4cc98f; --ok-soft: #1e3a2e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.7; }
  header { background: linear-gradient(120deg, var(--accent), #8a5cf6);
           color: #fff; padding: 32px 20px; text-align: center; }
  header h1 { font-size: 1.6rem; margin-bottom: 6px; }
  header p { opacity: .9; font-size: .95rem; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
  .dashboard { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
               padding: 20px; margin: -28px auto 24px; position: relative; box-shadow: 0 6px 24px rgba(0,0,0,.08); }
  .dash-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 1.8rem; }
  .level-name { font-weight: 700; }
  .bar-outer { flex: 1 1 240px; background: var(--accent-soft); border-radius: 99px; height: 14px; overflow: hidden; }
  .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), #8a5cf6);
               width: 0%; transition: width .5s; border-radius: 99px; }
  .pct { font-weight: 700; min-width: 5em; text-align: right; }
  .dojo { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; margin-bottom: 14px; }
  .dojo strong { font-size: .92rem; }
  .dojo .drow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .dojo a { font-size: .8rem; background: var(--accent-soft); color: var(--accent); text-decoration: none;
            padding: 5px 12px; border-radius: 99px; font-weight: 700; }
  .vhero { display:flex; align-items:center; gap:14px; text-decoration:none; margin-bottom:14px;
           background:linear-gradient(120deg,#4f6df5,#8a5cf6); color:#fff; border-radius:14px; padding:16px 18px;
           box-shadow:0 6px 20px rgba(79,109,245,.35); }
  .vhero-emo { font-size:2rem; }
  .vhero-txt { flex:1; display:flex; flex-direction:column; }
  .vhero-txt strong { font-size:1rem; }
  .vhero-txt small { opacity:.9; font-size:.78rem; margin-top:2px; }
  .vhero-go { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,.9); color:#4f6df5;
              display:flex; align-items:center; justify-content:center; font-size:1.1rem; padding-left:3px; flex-shrink:0; }
  details.part { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
                 margin-bottom: 12px; overflow: hidden; }
  summary { cursor: pointer; padding: 14px 18px; font-weight: 700; display: flex;
            align-items: center; gap: 10px; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary .part-pct { margin-left: auto; font-size: .85rem; color: var(--sub); font-weight: 400; white-space: nowrap; }
  .lvtag { font-size: .72rem; background: var(--accent-soft); color: var(--accent);
           padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  ul.chapters { list-style: none; border-top: 1px solid var(--line); }
  ul.chapters li { display: flex; align-items: center; gap: 10px; padding: 10px 18px;
                   border-bottom: 1px solid var(--line); font-size: .93rem; flex-wrap: wrap; }
  ul.chapters li:last-child { border-bottom: none; }
  ul.chapters input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--ok); cursor: pointer; flex-shrink: 0; }
  .ch-title a { color: var(--text); text-decoration: none; border-bottom: 1px dashed var(--sub); }
  .ch-title a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .links2 { margin-left: auto; display: flex; gap: 5px; flex-wrap: wrap; }
  .links2 a { font-size: .72rem; padding: 2px 9px; border-radius: 99px; text-decoration: none; font-weight: 700;
              background: var(--accent-soft); color: var(--accent); white-space: nowrap; }
  .links2 a.c { background: #f1e8fd; color: #8a5cf6; }
  @media (prefers-color-scheme: dark) { .links2 a.c { background: #322a4a; color: #b9a5f5; } }
  .links2 a.d { background: var(--ok-soft); color: var(--ok); }
  .links2 a.v { background: #ffe6d9; color: #d1560c; }
  @media (prefers-color-scheme: dark) { .links2 a.v { background: #43301f; color: #f5b98a; } }
  li.done .ch-title, li.done .ch-title a { color: var(--sub); text-decoration: line-through; }
  footer { text-align: center; color: var(--sub); font-size: .8rem; padding: 24px; }
  footer a { color: var(--accent); }
  @media (max-width: 600px) {
    header { padding: 24px 14px; }
    header h1 { font-size: 1.15rem; }
    .wrap { padding: 14px; }
    .dashboard { padding: 14px; }
    .pct { min-width: auto; }
    summary { padding: 12px 12px; font-size: .92rem; }
    ul.chapters li { padding: 10px 12px; }
    .links2 { margin-left: 28px; flex-basis: 100%; }
  }
</style>
</head>
<body>
<header>
  <h1>🖥️ 情シス養成講座「ゼロから一人前の情シスへ」</h1>
  <p>ナビゲーターの いろは です。今日も一緒にがんばりましょう!</p>
</header>

<div class="wrap">
  <div class="dashboard">
    <div class="dash-row">
      <span class="badge" id="badge">🌱</span>
      <div>
        <div class="level-name" id="levelName">レベル0 見習い</div>
        <div style="font-size:.8rem;color:var(--sub)" id="doneCount">0 章 修了</div>
      </div>
      <div class="bar-outer"><div class="bar-inner" id="bar"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
  </div>

  <a href="videos.html" class="vhero">
    <span class="vhero-emo">🎬</span>
    <span class="vhero-txt">
      <strong>動画で学ぶ(全30本・約55分)</strong>
      <small>ナビゲーター「いろは」がやさしく解説。各章の 🎬 からも直接見られます</small>
    </span>
    <span class="vhero-go">▶</span>
  </a>

  <div class="dojo">
    <strong>⚡ ドリル道場(スキマ時間5分・スマホOK)</strong>
    <div class="drow">
      <a href="drill.html?d=vi">viキー道場</a>
      <a href="drill.html?d=subnet">サブネット計算</a>
      <a href="drill.html?d=port">ポート番号かるた</a>
      <a href="drill.html?d=cmd">コマンド当て</a>
      <a href="drill.html?d=log">ログ読解</a>
      <a href="drill.html?d=shortcut">ショートカット即答</a>
    </div>
  </div>

  <div id="parts"></div>
</div>

<footer>
  進捗はこのブラウザ内(localStorage)に保存されます。<br>
  🎓 全課程を修了したら <a href="cert.html">一人前情シス認定証</a> を発行できます。
</footer>

<script src="js/videos-data.js"></script>

    ["3-11","総合演習:Webサーバー環境構築(LEMP)", L+"part3/3-11-lemp.html",null,null,null],
    ["3-12","ログの読み方とトラブルシュート", L+"part3/3-12-logs.html",null,"case3-12-logs","log"],
    ["3-13","Part 3 修了テスト(知識+実技)", null,"part3-test",null,null],
  ]},
  { id:"p4", level:"レベル2", title:"Part 4 Windows ServerとActive Directory", ch:[
    ["4-1","Windows Serverの役割と管理ツール", L+"part4/4-1-windows-server.html","part4-ch01",null,null],
    ["4-2","Active Directory基礎とドメイン構築", L+"part4/4-2-ad-basics.html","part4-ch02",null,null],
    ["4-3","グループポリシー(GPO)", L+"part4/4-3-gpo.html","part4-ch03",null,null],

    ["4-5","AD運用実務(入退社・棚卸し)", L+"part4/4-5-ad-operations.html",null,"case4-5-adops",null],
    ["4-6","Part 4 修了テスト", null,"part4-test",null,null],
  ]},
  { id:"p5", level:"レベル3", title:"Part 5 クラウドとSaaS管理", ch:[
    ["5-1","クラウドの基礎(IaaS/PaaS/SaaS)", L+"part5/5-1-cloud-basics.html","part5-ch01",null,null],
    ["5-2","Microsoft 365管理", L+"part5/5-2-m365.html","part5-ch02",null,null],
    ["5-3","Google Workspace管理", L+"part5/5-3-google-workspace.html",null,null,null],
    ["5-4","ID管理とSSO(SAML/OIDC/MFA)", L+"part5/5-4-sso-mfa.html","part5-ch04",null,null],

    ["6-2","マルウェアとエンドポイント防御", L+"part6/6-2-endpoint.html",null,null,null],
    ["6-3","ネットワークセキュリティとゼロトラスト", L+"part6/6-3-network-zerotrust.html","part6-ch03",null,null],
    ["6-4","脆弱性管理とパッチ運用", L+"part6/6-4-vuln-patch.html",null,null,null],
    ["6-5","標的型攻撃メール対応訓練(シミュレーター)", L+"part6/6-5-phishing-sim.html",null,null,null],
    ["6-6","インシデント対応", L+"part6/6-6-incident.html",null,"case6-6-ransom",null],
    ["6-7","法令・規格と認証(ISMS・Pマーク)", L+"part6/6-7-law-isms.html","part6-ch07",null,null],

  ]},
  { id:"p7", level:"レベル4", title:"Part 7 IT運用とヘルプデスク", ch:[
    ["7-1","ITIL入門(サービスとしてのIT)", L+"part7/7-1-itil.html","part7-ch01",null,null],
    ["7-2","ヘルプデスク実践", L+"part7/7-2-helpdesk.html",null,"case7-2-helpdesk",null],

    ["8-6","非IT部門に伝わる説明力", L+"part8/8-6-communication.html",null,null,null],

    ["9-2","卒業試験(知識30問+実技)", L+"part9/9-2-graduation-exam.html","part9-grad",null,null],
    ["9-3","卒業制作:自宅ラボ構築レポート", L+"part9/9-3-portfolio.html",null,null,null],
  ]},
];

const LEVELS = [
  [0,  "🌱", "レベル0 見習い"],
  [10, "🔰", "レベル1 アシスタント"],
  [40, "🔧", "レベル2 オペレーター"],
  [65, "☁️", "レベル3 担当者"],
  [85, "🏆", "レベル4 一人前"],
  [100,"👑", "卒業!一人前情シス認定"],
];

const KEY = "joshi-progress";
const state = JSON.parse(localStorage.getItem(KEY) || "{}");
const total = CURRICULUM.reduce((n,p)=>n+p.ch.length,0);

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function render(){
  const root = document.getElementById("parts");
  root.innerHTML = "";
  CURRICULUM.forEach(part=>{
    const done = part.ch.filter(c=>state[c[0]]).length;
    const d = document.createElement("details");
    d.className = "part";
    if (done < part.ch.length && done > 0) d.open = true;
    d.innerHTML = `<summary><span class="lvtag">${part.level}</span>${part.title}
      <span class="part-pct">${done}/${part.ch.length}</span></summary>`;
    const ul = document.createElement("ul");
    ul.className = "chapters";
    part.ch.forEach(([id,title,lesson,quiz,cs,drill])=>{
      const li = document.createElement("li");
      if (state[id]) li.className = "done";
      const titleHtml = lesson
        ? `<a href="${lesson}"><strong>${id}</strong> ${title}</a>`
        : `<strong>${id}</strong> ${title}`;
      let links = "";
      const vids = (window.VIDEOS_BY_CHAPTER||{})[id];
      if (vids && vids.length) links += `<a class="v" href="video.html?v=${encodeURIComponent(vids[0].file)}">🎬 動画${vids.length>1?"×"+vids.length:""}</a>`;
      if (quiz)  links += `<a href="quiz.html?q=${quiz}">📝 ${id.includes("テスト")||title.includes("テスト")||title.includes("試験")?"テスト":"クイズ"}</a>`;
      if (cs)    links += `<a class="c" href="case.html?c=${cs}">🎭 ケース</a>`;
      if (drill) links += `<a class="d" href="drill.html?d=${drill}">⚡ ドリル</a>`;
      li.innerHTML = `<input type="checkbox" id="c${id}" ${state[id]?"checked":""}>
        <span class="ch-title">${titleHtml}</span>
        <span class="links2">${links}</span>`;
      li.querySelector("input").addEventListener("change", e=>{
        state[id] = e.target.checked; if(!e.target.checked) delete state[id];
        save(); render();
      });
      ul.appendChild(li);
    });
    d.appendChild(ul);
    root.appendChild(d);
  });
  updateDash();
}

function updateDash(){
  const done = Object.keys(state).filter(k=>state[k]).length;
  const pct = Math.round(done/total*100);
  document.getElementById("bar").style.width = pct+"%";
  document.getElementById("pct").textContent = pct+"%";
  document.getElementById("doneCount").textContent = `${done} / ${total} 章 修了`;
  let lv = LEVELS[0];
  LEVELS.forEach(l=>{ if(pct>=l[0]) lv=l; });
  document.getElementById("badge").textContent = lv[1];
  document.getElementById("levelName").textContent = lv[2];
}

render();
</script>
</body>
</html>
