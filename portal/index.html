<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情シス養成講座 学習ポータル</title>
<style>
  :root {
    --bg: #f6f7fb; --card: #ffffff; --text: #1f2430; --sub: #626b7f;
    --accent: #4f6df5; --accent-soft: #e8ecfe; --line: #e3e6ee;
    --ok: #2fa572; --ok-soft: #e2f5ec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171f; --card: #1d212c; --text: #e8eaf0; --sub: #99a1b3;
      --accent: #7b93ff; --accent-soft: #2a3350; --line: #2c3140;
      --ok: #4cc98f; --ok-soft: #1e3a2e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.7; }
  header { background: linear-gradient(120deg, var(--accent), #8a5cf6);
           color: #fff; padding: 32px 20px; text-align: center; }
  header h1 { font-size: 1.6rem; margin-bottom: 6px; }
  header p { opacity: .9; font-size: .95rem; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
  .dashboard { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
               padding: 20px; margin: -28px auto 24px; position: relative; box-shadow: 0 6px 24px rgba(0,0,0,.08); }
  .dash-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 1.8rem; }
  .level-name { font-weight: 700; }
  .bar-outer { flex: 1 1 240px; background: var(--accent-soft); border-radius: 99px; height: 14px; overflow: hidden; }
  .bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), #8a5cf6);
               width: 0%; transition: width .5s; border-radius: 99px; }
  .pct { font-weight: 700; min-width: 5em; text-align: right; }
  details.part { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
                 margin-bottom: 12px; overflow: hidden; }
  summary { cursor: pointer; padding: 14px 18px; font-weight: 700; display: flex;
            align-items: center; gap: 10px; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary .part-pct { margin-left: auto; font-size: .85rem; color: var(--sub); font-weight: 400; }
  .lvtag { font-size: .72rem; background: var(--accent-soft); color: var(--accent);
           padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  ul.chapters { list-style: none; border-top: 1px solid var(--line); }
  ul.chapters li { display: flex; align-items: center; gap: 10px; padding: 10px 18px;
                   border-bottom: 1px solid var(--line); font-size: .93rem; flex-wrap: wrap; }
  ul.chapters li:last-child { border-bottom: none; }
  ul.chapters input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--ok); cursor: pointer; }
  .media { margin-left: auto; display: flex; gap: 4px; flex-wrap: wrap; }
  .m { font-size: .68rem; padding: 1px 7px; border-radius: 99px; background: var(--accent-soft);
       color: var(--accent); white-space: nowrap; }
  .m.lab { background: var(--ok-soft); color: var(--ok); }
  li.done .ch-title { color: var(--sub); text-decoration: line-through; }
  .links { margin: 24px 0; text-align: center; font-size: .9rem; color: var(--sub); }
  .links a { color: var(--accent); }
  footer { text-align: center; color: var(--sub); font-size: .8rem; padding: 24px; }
  /* スマホ最適化 */
  @media (max-width: 600px) {
    header { padding: 24px 14px; }
    header h1 { font-size: 1.15rem; }
    .wrap { padding: 14px; }
    .dashboard { padding: 14px; }
    .pct { min-width: auto; }
    summary { padding: 12px 12px; font-size: .92rem; }
    ul.chapters li { padding: 10px 12px; }
    .media { margin-left: 28px; flex-basis: 100%; }
  }
</style>
</head>
<body>
<header>
  <h1>🖥️ 情シス養成講座「ゼロから一人前の情シスへ」</h1>
  <p>ナビゲーターの いろは です。今日も一緒にがんばりましょう!</p>
</header>

<div class="wrap">
  <div class="dashboard">
    <div class="dash-row">
      <span class="badge" id="badge">🌱</span>
      <div>
        <div class="level-name" id="levelName">レベル0 見習い</div>
        <div style="font-size:.8rem;color:var(--sub)" id="doneCount">0 / 70 章 修了</div>
      </div>
      <div class="bar-outer"><div class="bar-inner" id="bar"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
  </div>

  <div id="parts"></div>

  <div class="links">
    📖 サンプル教材: <a href="../lessons/part3/3-05-vi.html">3-5 viエディタ完全入門</a> /
    📝 サンプルクイズ: <a href="quiz.html">viエディタ 章末クイズ</a>
  </div>
</div>

<footer>進捗はこのブラウザ内(localStorage)に保存されます。</footer>

<script>
const CURRICULUM = [
  { id:"p0", level:"レベル0", title:"Part 0 オリエンテーション:情シスという仕事", chapters:[
    ["0-1","情シスとは何か 〜会社のITを支える仕事〜",["動画","クイズ"]],
    ["0-2","情シスの1日・1年 〜リアルな業務カレンダー〜",["動画","HTML"]],
    ["0-3","このコースの歩き方",["HTML"]],
    ["0-4","情シスのキャリアと資格マップ",["HTML","クイズ"]],
  ]},
  { id:"p1", level:"レベル1", title:"Part 1 コンピュータとOSの基礎", chapters:[
    ["1-1","コンピュータの仕組み(CPU・メモリ・ストレージ)",["動画","クイズ"]],
    ["1-2","OSの役割 〜WindowsとmacOSとLinux〜",["動画","HTML","クイズ"]],
    ["1-3","Windowsクライアント管理入門",["ラボ","クイズ"]],
    ["1-4","PCキッティングとMDM入門",["動画","ラボ"]],
    ["1-5","ハードウェアトラブルシュート",["ケース"]],
    ["1-6","Part 1 修了テスト",["テスト"]],
  ]},
  { id:"p2", level:"レベル1", title:"Part 2 ネットワーク基礎と実践", chapters:[
    ["2-1","ネットワークの全体像とOSI参照モデル",["動画","クイズ"]],
    ["2-2","IPアドレスとサブネット",["動画","ドリル"]],
    ["2-3","TCP/UDPとポート番号",["HTML","ドリル","クイズ"]],
    ["2-4","DNSの仕組み",["動画","ラボ"]],
    ["2-5","DHCP・NAT・ルーティング",["HTML","ラボ"]],
    ["2-6","スイッチ・VLAN・無線LAN",["動画","HTML","クイズ"]],
    ["2-7","VPNとリモートアクセス",["HTML","クイズ"]],
    ["2-8","ネットワークトラブルシュート実践",["ラボ","ケース"]],
    ["2-9","Part 2 修了テスト",["テスト"]],
  ]},
  { id:"p3", level:"レベル2", title:"Part 3 Linuxサーバー入門〜実践 ★中核パート", chapters:[
    ["3-1","Linuxとは・ディストリビューションの選び方",["動画","クイズ"]],
    ["3-2","学習環境構築(VirtualBox+Ubuntu Server)",["ラボ"]],
    ["3-3","基本コマンドI(ファイル操作・パイプ・リダイレクト)",["ラボ","ドリル"]],
    ["3-4","基本コマンドII(検索・圧縮・プロセス)",["ラボ","ドリル"]],
    ["3-5","viエディタ完全入門",["動画","ドリル","ラボ"]],
    ["3-6","ユーザー・グループとパーミッション",["ラボ","クイズ"]],
    ["3-7","パッケージ管理とsystemd",["ラボ","クイズ"]],
    ["3-8","シェルスクリプト入門とcron",["ラボ"]],
    ["3-9","SSHとファイル転送",["ラボ","クイズ"]],
    ["3-10","nginx入門:インストールと設定の読み方",["動画","ラボ"]],
    ["3-11","総合演習:Webサーバー環境構築(LEMP)",["ラボ"]],
    ["3-12","ログの読み方とトラブルシュート",["ケース","ドリル"]],
    ["3-13","Part 3 修了テスト(知識+実技)",["テスト"]],
  ]},
  { id:"p4", level:"レベル2", title:"Part 4 Windows ServerとActive Directory", chapters:[
    ["4-1","Windows Serverの役割と管理ツール",["動画","HTML"]],
    ["4-2","Active Directory基礎とドメイン構築",["動画","ラボ"]],
    ["4-3","グループポリシー(GPO)",["ラボ","クイズ"]],
    ["4-4","ファイルサーバーとアクセス権設計",["ラボ","クイズ"]],
    ["4-5","AD運用実務(入退社・棚卸し)",["ケース"]],
    ["4-6","Part 4 修了テスト",["テスト"]],
  ]},
  { id:"p5", level:"レベル3", title:"Part 5 クラウドとSaaS管理", chapters:[
    ["5-1","クラウドの基礎(IaaS/PaaS/SaaS)",["動画","クイズ"]],
    ["5-2","Microsoft 365管理",["動画","ラボ"]],
    ["5-3","Google Workspace管理",["ラボ","HTML"]],
    ["5-4","ID管理とSSO(SAML/OIDC/MFA)",["動画","HTML","クイズ"]],
    ["5-5","AWS基礎(VPC/EC2/S3/IAM)",["動画","ラボ"]],
    ["5-6","SaaSの選定と管理",["ケース"]],
    ["5-7","Part 5 修了テスト",["テスト"]],
  ]},
  { id:"p6", level:"レベル3", title:"Part 6 情報セキュリティ", chapters:[
    ["6-1","セキュリティの基礎と攻撃手法",["動画","クイズ"]],
    ["6-2","マルウェアとエンドポイント防御",["動画","HTML"]],
    ["6-3","ネットワークセキュリティとゼロトラスト",["HTML","クイズ"]],
    ["6-4","脆弱性管理とパッチ運用",["ラボ"]],
    ["6-5","標的型攻撃メール対応訓練",["演習"]],
    ["6-6","インシデント対応",["ケース"]],
    ["6-7","法令・規格とセキュリティポリシー",["HTML","クイズ"]],
    ["6-8","Part 6 修了テスト",["テスト"]],
  ]},
  { id:"p7", level:"レベル4", title:"Part 7 IT運用とヘルプデスク", chapters:[
    ["7-1","ITIL入門(サービスとしてのIT)",["動画","クイズ"]],
    ["7-2","ヘルプデスク実践",["ケース"]],
    ["7-3","IT資産管理とライセンス管理",["HTML","演習"]],
    ["7-4","監視とアラート",["ラボ"]],
    ["7-5","バックアップとBCP/DR",["HTML","演習"]],
    ["7-6","障害対応総合訓練",["演習"]],
    ["7-7","Part 7 修了テスト",["テスト"]],
  ]},
  { id:"p8", level:"レベル4", title:"Part 8 情シス実務スキル", chapters:[
    ["8-1","ベンダーマネジメント",["HTML","演習"]],
    ["8-2","IT予算と稟議",["HTML","演習"]],
    ["8-3","社内規程とIT統制",["HTML","クイズ"]],
    ["8-4","システム導入プロジェクト管理",["ケース"]],
    ["8-5","ドキュメンテーションと構成管理",["演習"]],
    ["8-6","非IT部門に伝わる説明力",["動画","演習"]],
    ["8-7","Part 8 修了テスト",["テスト"]],
  ]},
  { id:"p9", level:"卒業", title:"Part 9 総合演習と卒業試験", chapters:[
    ["9-1","総合シナリオ演習「ある日の情シス、全部盛り」",["演習"]],
    ["9-2","卒業試験(知識100問+実技)",["テスト"]],
    ["9-3","卒業制作:自宅ラボ構築レポート",["演習"]],
  ]},
];

const LEVELS = [
  [0,  "🌱", "レベル0 見習い"],
  [10, "🔰", "レベル1 アシスタント"],
  [40, "🔧", "レベル2 オペレーター"],
  [65, "☁️", "レベル3 担当者"],
  [85, "🏆", "レベル4 一人前"],
  [100,"👑", "卒業!一人前情シス認定"],
];

const KEY = "joshi-progress";
const state = JSON.parse(localStorage.getItem(KEY) || "{}");
const total = CURRICULUM.reduce((n,p)=>n+p.chapters.length,0);

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function render(){
  const root = document.getElementById("parts");
  root.innerHTML = "";
  CURRICULUM.forEach(part=>{
    const done = part.chapters.filter(c=>state[c[0]]).length;
    const d = document.createElement("details");
    d.className = "part";
    if (done < part.chapters.length && done > 0) d.open = true;
    d.innerHTML = `<summary><span class="lvtag">${part.level}</span>${part.title}
      <span class="part-pct">${done}/${part.chapters.length}</span></summary>`;
    const ul = document.createElement("ul");
    ul.className = "chapters";
    part.chapters.forEach(([id,title,media])=>{
      const li = document.createElement("li");
      if (state[id]) li.className = "done";
      li.innerHTML = `<input type="checkbox" id="c${id}" ${state[id]?"checked":""}>
        <label for="c${id}" class="ch-title" style="cursor:pointer"><strong>${id}</strong> ${title}</label>
        <span class="media">${media.map(m=>`<span class="m ${m==="ラボ"?"lab":""}">${m}</span>`).join("")}</span>`;
      li.querySelector("input").addEventListener("change", e=>{
        state[id] = e.target.checked; if(!e.target.checked) delete state[id];
        save(); render();
      });
      ul.appendChild(li);
    });
    d.appendChild(ul);
    root.appendChild(d);
  });
  updateDash();
}

function updateDash(){
  const done = Object.keys(state).filter(k=>state[k]).length;
  const pct = Math.round(done/total*100);
  document.getElementById("bar").style.width = pct+"%";
  document.getElementById("pct").textContent = pct+"%";
  document.getElementById("doneCount").textContent = `${done} / ${total} 章 修了`;
  let lv = LEVELS[0];
  LEVELS.forEach(l=>{ if(pct>=l[0]) lv=l; });
  document.getElementById("badge").textContent = lv[1];
  document.getElementById("levelName").textContent = lv[2];
}

render();
</script>
</body>
</html>
